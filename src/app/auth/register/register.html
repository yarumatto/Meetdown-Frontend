<div class="auth-wrap">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Créer un compte</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Nom d'utilisateur</mat-label>
          <input matInput formControlName="username">
          <mat-error *ngIf="form.get('username')?.hasError('minlength')">3 caractères minimum</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Mot de passe (8 caractères min)</mat-label>
          <input matInput type="password" formControlName="password">
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                class="full" [disabled]="form.invalid || loading">
          {{ loading ? 'Création...' : 'Créer mon compte' }}
        </button>
      </form>
      <p class="switch-link">
        Déjà inscrit ? <a routerLink="/auth/login">Se connecter</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>
